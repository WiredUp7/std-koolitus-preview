<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">

<title>Lehte ei leitud – Look360</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
       background:radial-gradient(1100px 560px at 50% -12%, #14231c, #0a0b0e 62%);
       font-family:"Poppins",-apple-system,"Segoe UI",sans-serif;color:#eef0f4;-webkit-font-smoothing:antialiased;text-align:center}
  .wm{font-weight:700;font-size:22px;letter-spacing:-.02em;margin-bottom:26px}
  .wm i{font-style:normal;color:#17b86a}
  .code{font-weight:300;font-size:clamp(64px,14vw,120px);line-height:1;letter-spacing:-.04em;
        background:linear-gradient(120deg,#1fd07a,#06b6b6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  h1{font-weight:500;font-size:clamp(19px,3vw,26px);margin:14px 0 10px}
  p{color:#9aa1ad;font-weight:300;font-size:15px;line-height:1.65;max-width:420px;margin:0 auto 30px}
  .acts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-flex;align-items:center;gap:8px;font-weight:500;font-size:14.5px;padding:12px 22px;border-radius:12px;text-decoration:none;transition:.2s}
  a.grad{background:linear-gradient(120deg,#1fd07a,#06b6b6);color:#04231a;font-weight:600}
  a.grad:hover{transform:translateY(-2px)}
  a.out{color:#eef0f4;border:1px solid rgba(255,255,255,.22)}
  a.out:hover{border-color:#fff;background:rgba(255,255,255,.06)}
</style>
</head>
<body>
<main>
  <div class="wm">Look<i>360</i></div>
  <div class="code">404</div>
  <h1>Seda lehte ei leitud</h1>
  <p>Link võib olla vigane või on leht liikunud. <span lang="en">Page not found — the link may be broken or the page has moved.</span></p>
  <div class="acts">
    <a class="btn grad" href="/">Avaleht</a>
    <a class="btn out" href="/kasutusjuhend.html">Kasutusjuhend</a>
    <a class="btn out" href="https://scan.look360.eu/accounts/login/">Logi sisse</a>
  </div>
</main>
